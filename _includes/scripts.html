<script src="{{ base_path }}/assets/js/main.min.js"></script>

<script>
(function($) {
  function forceResponsiveMenu() {
    var $nav = $('#site-nav');
    var $btn = $('#site-nav button');
    var $visible = $('#site-nav .visible-links');
    var $hidden = $('#site-nav .hidden-links');

    if (!$nav.length) return;

    if (window.matchMedia('(max-width: 768px)').matches) {
      $visible.children('.masthead__menu-item:not(.masthead__menu-item--lg)').appendTo($hidden);
      $btn.show().removeClass('hidden close');
      $hidden.addClass('hidden').hide();
    } else {
      $hidden.children().appendTo($visible);
      $btn.hide().addClass('hidden').removeClass('close');
      $hidden.addClass('hidden').hide();
    }
  }

  $(function() {
    forceResponsiveMenu();

    $(window).on('resize.forceResponsiveMenu', function() {
      forceResponsiveMenu();
    });

    $('#site-nav button').off('click').on('click', function() {
      var $hidden = $('#site-nav .hidden-links');
      $(this).toggleClass('close');
      $hidden.toggleClass('hidden').toggle();
    });
  });
function closeAuthorFollowOnMobile() {
  if (window.matchMedia('(max-width: 768px)').matches) {
    $('.author__urls').addClass('is--hidden').removeClass('is--visible');
  }
}

<script>
$(document).ready(function() {

  function closeFollowMenuOnMobile() {
    if (window.matchMedia("(max-width: 768px)").matches) {
      $(".author__urls").each(function() {
        this.style.setProperty("display", "none", "important");
      });
      $(".author__urls").removeClass("is--visible follow-open");
    } else {
      $(".author__urls").each(function() {
        this.style.removeProperty("display");
      });
    }
  }

  closeFollowMenuOnMobile();

  $(window).on("resize.followMenuFix", function() {
    closeFollowMenuOnMobile();
  });

  $(document).off("click.followMenuFix", ".author__urls-wrapper button");

  $(document).on("click.followMenuFix", ".author__urls-wrapper button", function(e) {
    e.preventDefault();
    e.stopPropagation();

    var menu = $(this).closest(".author__urls-wrapper").find(".author__urls").get(0);

    if (!menu) return;

    var currentDisplay = window.getComputedStyle(menu).display;

    if (currentDisplay === "none") {
      menu.style.setProperty("display", "block", "important");
    } else {
      menu.style.setProperty("display", "none", "important");
    }
  });

});
</script>
})(jQuery);
</script>
