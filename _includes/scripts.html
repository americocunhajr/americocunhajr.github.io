<script src="{{ base_path }}/assets/js/main.min.js"></script>

<script>
(function($) {
  $(function() {

    function isMobile() {
      return window.matchMedia("(max-width: 768px)").matches;
    }

    function forceResponsiveMenu() {
      var $btn = $("#site-nav > button");
      var $visible = $("#site-nav > .visible-links");
      var $hidden = $("#site-nav > .hidden-links");

      if (isMobile()) {
        $visible.children(".masthead__menu-item:not(.masthead__menu-item--lg)").appendTo($hidden);

        $btn
          .removeClass("hidden close")
          .css("display", "block");

        $hidden
          .addClass("hidden")
          .css("display", "none");

      } else {
        $hidden.children().appendTo($visible);

        $btn
          .addClass("hidden")
          .removeClass("close")
          .css("display", "none");

        $hidden
          .addClass("hidden")
          .css("display", "none");
      }
    }

    forceResponsiveMenu();

    $(window).off("resize.forceResponsiveMenu").on("resize.forceResponsiveMenu", function() {
      forceResponsiveMenu();
    });

    $(document).off("click.topMenu", "#site-nav > button");
    $(document).on("click.topMenu", "#site-nav > button", function(e) {
      e.preventDefault();
      e.stopPropagation();

      var $hidden = $("#site-nav > .hidden-links");

      $(this).toggleClass("close");

      if ($hidden.hasClass("hidden")) {
        $hidden
          .removeClass("hidden")
          .css("display", "block");
      } else {
        $hidden
          .addClass("hidden")
          .css("display", "none");
      }
    });


    /* Follow menu */

    function closeAuthorFollowOnMobile() {
      var $followMenu = $(".author__urls-wrapper .author__urls");

      if (isMobile()) {
        $followMenu.css("display", "none");
      } else {
        $followMenu.css("display", "");
      }
    }

    closeAuthorFollowOnMobile();

    $(window).off("resize.authorFollow").on("resize.authorFollow", function() {
      closeAuthorFollowOnMobile();
    });

    $(document).off("click.authorFollow", ".author__urls-wrapper > button");
    $(document).on("click.authorFollow", ".author__urls-wrapper > button", function(e) {
      e.preventDefault();
      e.stopPropagation();

      $(this)
        .closest(".author__urls-wrapper")
        .find(".author__urls")
        .toggle();
    });

  });
})(jQuery);
</script>
