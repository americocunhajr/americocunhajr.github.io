<script src="{{ base_path }}/assets/js/main.min.js"></script>

<script>
(function($) {
  function forceResponsiveMenu() {
    var $nav = $('#site-nav');
    var $btn = $('#site-nav button');
    var $visible = $('#site-nav .visible-links');
    var $hidden = $('#site-nav .hidden-links');

    if (!$nav.length) return;

    if (window.matchMedia('(max-width: 768px)').matches) {
      $visible.children('.masthead__menu-item:not(.masthead__menu-item--lg)').appendTo($hidden);
      $btn.show().removeClass('hidden close');
      $hidden.addClass('hidden').hide();
    } else {
      $hidden.children().appendTo($visible);
      $btn.hide().addClass('hidden').removeClass('close');
      $hidden.addClass('hidden').hide();
    }
  }

  $(function() {
    forceResponsiveMenu();

    $(window).on('resize.forceResponsiveMenu', function() {
      forceResponsiveMenu();
    });

    $('#site-nav button').off('click').on('click', function() {
      var $hidden = $('#site-nav .hidden-links');
      $(this).toggleClass('close');
      $hidden.toggleClass('hidden').toggle();
    });
  });
function closeAuthorFollowOnMobile() {
  if (window.matchMedia('(max-width: 768px)').matches) {
    $('.author__urls').addClass('is--hidden').removeClass('is--visible');
  }
}

<script>
$(function() {
  var $followButton = $(".author__urls-wrapper button");
  var $followMenu = $(".author__urls-wrapper .author__urls");

  function isMobile() {
    return window.matchMedia("(max-width: 768px)").matches;
  }

  function closeFollowMenu() {
    if (isMobile()) {
      $followMenu.attr("style", "display: none !important;");
    } else {
      $followMenu.removeAttr("style");
    }
  }

  closeFollowMenu();

  $followButton.off("click.followMenuFix").on("click.followMenuFix", function(e) {
    e.preventDefault();
    e.stopPropagation();

    var $menu = $(this).closest(".author__urls-wrapper").find(".author__urls");

    if ($menu.is(":visible")) {
      $menu.attr("style", "display: none !important;");
    } else {
      $menu.attr("style", "display: block !important;");
    }
  });

  $(window).off("resize.followMenuFix").on("resize.followMenuFix", function() {
    closeFollowMenu();
  });
});
</script>
})(jQuery);
</script>
